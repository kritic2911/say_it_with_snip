<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Space Mono',monospace;
    background:#0a0a0a;
    color:#e8e0d0;
    min-height:100vh;
    overflow-x:hidden;
  }
  #app {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
  }

  /* UPLOAD */
  #upload-screen { display:flex; flex-direction:column; align-items:center; gap:1.8rem; text-align:center; }
  .title { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.5rem,7vw,5.5rem); letter-spacing:0.08em; line-height:1; color:#f0e8d8; text-shadow:0 0 40px rgba(255,160,60,0.3); }
  .subtitle { font-size:0.65rem; letter-spacing:0.3em; color:#7a7060; text-transform:uppercase; margin-top:0.4rem; }
  .drop-zone { width:min(460px,90vw); height:180px; border:1.5px dashed #3a3028; border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.8rem; cursor:pointer; transition:border-color 0.3s,background 0.3s; position:relative; }
  .drop-zone:hover, .drop-zone.drag-over { border-color:#c87020; background:rgba(200,112,32,0.06); }
  .drop-icon { font-size:2.5rem; opacity:0.5; }
  .drop-text { font-size:0.68rem; color:#6a6050; letter-spacing:0.15em; }
  .drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }

  /* CHOICE */
  #choice-screen { display:none; flex-direction:column; align-items:center; gap:2rem; text-align:center; }
  .file-info { font-size:0.65rem; letter-spacing:0.2em; color:#8a7a60; }
  .file-name { color:#d4c4a0; font-weight:700; }
  .choice-row { display:flex; gap:1.2rem; flex-wrap:wrap; justify-content:center; }
  .choice-btn { width:160px; height:180px; background:#111009; border:1px solid #2a2018; border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; cursor:pointer; transition:all 0.3s; }
  .choice-btn.tear-btn:hover { border-color:#5080c0; box-shadow:0 0 40px rgba(80,128,192,0.15); }
  .choice-btn.burn-btn:hover { border-color:#c87020; box-shadow:0 0 40px rgba(200,112,32,0.2); }
  .choice-icon { font-size:3rem; line-height:1; }
  .choice-label { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:0.12em; }
  .tear-btn .choice-label { color:#80aaee; }
  .burn-btn .choice-label { color:#e0800a; }
  .choice-sub { font-size:0.58rem; letter-spacing:0.2em; color:#5a5040; text-transform:uppercase; }

  /* ANIM */
  #anim-screen { display:none; flex-direction:column; align-items:center; gap:1.2rem; width:100%; max-width:560px; }
  .anim-header { display:flex; justify-content:space-between; align-items:center; width:100%; }
  .anim-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.15em; }
  .anim-title.tearing { color:#80aaee; }
  .anim-title.burning { color:#e0800a; }
  .page-counter { font-size:0.6rem; letter-spacing:0.2em; color:#5a5040; }

  /* Stage */
  .stage {
    width:min(380px,90vw);
    height:500px;
    position:relative;
    border:1px solid #1a1810;
    border-radius:2px;
    overflow:hidden;
    background:#0d0c0a;
    flex-shrink:0;
  }

  /* The canvas showing the PDF page */
  #page-canvas {
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    border-radius:1px;
    box-shadow:4px 6px 20px rgba(0,0,0,0.7);
    display:block;
  }

  /* Halves for tear */
  #half-left, #half-right {
    position:absolute;
    top:50%;
    display:none;
    box-shadow:4px 6px 20px rgba(0,0,0,0.7);
  }

  #debris-layer { position:absolute; inset:0; pointer-events:none; overflow:hidden; }

  /* Progress */
  .progress-track { width:min(380px,90vw); height:2px; background:#1a1810; }
  .progress-fill { height:100%; background:#5a5040; transition:width 0.3s; }
  .progress-fill.tearing { background:#5080c0; }
  .progress-fill.burning { background:#c87020; }

  .status-text { font-size:0.6rem; letter-spacing:0.25em; color:#4a4030; text-transform:uppercase; min-height:1.2rem; text-align:center; }
  .restart-btn { font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:#5a5040; background:none; border:1px solid #2a2018; border-radius:2px; padding:0.5rem 1.2rem; cursor:pointer; transition:all 0.3s; display:none; }
  .restart-btn:hover { border-color:#6a6050; color:#a09070; }

  /* Paper confetti */
  .paper-piece { position:absolute; }
  @keyframes pieceFloat {
    0% { opacity:0.9; }
    100% { transform:translate(var(--tx),var(--ty)) rotate(var(--rot)); opacity:0; }
  }
  /* Ember */
  .ember { position:absolute; border-radius:50%; }
  @keyframes emberFloat {
    0% { opacity:1; }
    100% { transform:translate(var(--ex),var(--ey)); opacity:0; }
  }
  /* Smoke */
  .smoke { position:absolute; border-radius:50%; }
  @keyframes smokeRise {
    0% { transform:translate(var(--sx),0) scale(0.3); opacity:0.5; }
    100% { transform:translate(var(--sx),-130px) scale(2.5); opacity:0; }
  }
  /* Ash */
  .ash { position:absolute; background:#2a2520; border-radius:1px; }
  @keyframes ashFall {
    0% { opacity:0.8; }
    100% { transform:translateY(var(--ey)) rotate(var(--rot)); opacity:0; }
  }

  body.on-fire { background:radial-gradient(ellipse at center bottom,#1a0800 0%,#0a0a0a 60%); }

  .done-section { display:flex; flex-direction:column; align-items:center; gap:0.8rem; }
</style>
</head>
<body>
<div id="app">

  <div id="upload-screen">
    <div>
      <div class="title">DESTROY<br>THIS PDF</div>
      <div class="subtitle">real pages. real destruction.</div>
    </div>
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">📄</div>
      <div class="drop-text">DROP PDF HERE · OR CLICK TO BROWSE</div>
      <input type="file" accept=".pdf" id="file-input">
    </div>
  </div>

  <div id="choice-screen">
    <div>
      <div class="title" style="font-size:clamp(2rem,5vw,3.5rem)">CHOOSE<br>YOUR FATE</div>
    </div>
    <div class="file-info">
      <span class="file-name" id="show-filename">—</span><br>
      <span id="show-pages">0</span> pages detected
    </div>
    <div class="choice-row">
      <div class="choice-btn tear-btn" id="btn-tear">
        <div class="choice-icon">✂️</div>
        <div class="choice-label">TEAR</div>
        <div class="choice-sub">ripped apart</div>
      </div>
      <div class="choice-btn burn-btn" id="btn-burn">
        <div class="choice-icon">🔥</div>
        <div class="choice-label">BURN</div>
        <div class="choice-sub">reduced to ash</div>
      </div>
    </div>
  </div>

  <div id="anim-screen">
    <div class="anim-header">
      <div class="anim-title" id="anim-title">TEARING</div>
      <div class="page-counter" id="page-counter">PAGE 0 / 0</div>
    </div>
    <div class="stage" id="stage">
      <canvas id="page-canvas"></canvas>
      <canvas id="half-left"></canvas>
      <canvas id="half-right"></canvas>
      <div id="debris-layer"></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="done-section">
      <div class="status-text" id="status-text">loading...</div>
      <button class="restart-btn" id="restart-btn">↩ destroy another</button>
    </div>
  </div>

</div>

<!-- Load PDF.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
const $ = id => document.getElementById(id);

// Set worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let totalPages = 0;
let currentPage = 0;
let mode = 'tear';
let animRunning = false;
let stageW = 380, stageH = 500;

// Rendered page images (as ImageData or offscreen canvases)
const renderedPages = {};

$('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) handleFile(f);
});

const dz = $('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

async function handleFile(file) {
  $('status-text').textContent = 'loading pdf...';
  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  totalPages = pdfDoc.numPages;
  $('show-filename').textContent = file.name;
  $('show-pages').textContent = totalPages;
  show('choice-screen');
}

$('btn-tear').addEventListener('click', () => startDestruction('tear'));
$('btn-burn').addEventListener('click', () => startDestruction('burn'));
$('restart-btn').addEventListener('click', () => {
  document.body.classList.remove('on-fire');
  show('upload-screen');
  $('file-input').value = '';
  $('restart-btn').style.display = 'none';
  $('progress-fill').style.width = '0%';
  Object.keys(renderedPages).forEach(k => delete renderedPages[k]);
  pdfDoc = null;
});

function show(screenId) {
  ['upload-screen','choice-screen','anim-screen'].forEach(id => {
    $(id).style.display = id === screenId ? 'flex' : 'none';
  });
}

async function startDestruction(m) {
  mode = m;
  currentPage = 0;
  animRunning = true;
  if (m === 'burn') document.body.classList.add('on-fire');

  const title = $('anim-title');
  title.textContent = m === 'tear' ? 'TEARING' : 'BURNING';
  title.className = 'anim-title ' + (m === 'tear' ? 'tearing' : 'burning');
  $('progress-fill').className = 'progress-fill ' + (m === 'tear' ? 'tearing' : 'burning');

  show('anim-screen');
  $('restart-btn').style.display = 'none';

  // Get actual stage size
  const stageEl = $('stage');
  stageW = stageEl.offsetWidth || 380;
  stageH = stageEl.offsetHeight || 500;

  $('status-text').textContent = 'rendering pages...';
  await prerenderPages();
  $('status-text').textContent = m === 'tear' ? 'grip tight...' : 'igniting...';
  setTimeout(() => nextPage(), 400);
}

async function prerenderPages() {
  // Render all pages to offscreen canvases
  const maxW = stageW - 20;
  const maxH = stageH - 20;

  for (let i = 1; i <= totalPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport0 = page.getViewport({ scale: 1 });
    const scale = Math.min(maxW / viewport0.width, maxH / viewport0.height, 2);
    const viewport = page.getViewport({ scale });

    const oc = document.createElement('canvas');
    oc.width = Math.floor(viewport.width);
    oc.height = Math.floor(viewport.height);
    const ctx = oc.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, oc.width, oc.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    renderedPages[i] = oc;
  }
}

function getPageCanvas(pageNum) {
  return renderedPages[pageNum];
}

async function nextPage() {
  if (!animRunning) return;
  currentPage++;
  if (currentPage > totalPages) { finishDestruction(); return; }

  $('page-counter').textContent = `PAGE ${currentPage} / ${totalPages}`;
  $('progress-fill').style.width = ((currentPage - 1) / totalPages * 100) + '%';
  $('debris-layer').innerHTML = '';

  const src = getPageCanvas(currentPage);
  if (!src) { nextPage(); return; }

  // Draw page onto main canvas
  const pc = $('page-canvas');
  pc.width = src.width;
  pc.height = src.height;
  pc.style.width = src.width + 'px';
  pc.style.height = src.height + 'px';
  pc.style.display = 'block';
  pc.style.transform = 'translate(-50%,-50%)';
  pc.style.left = '50%';
  pc.style.top = '50%';
  pc.style.position = 'absolute';
  const ctx = pc.getContext('2d');
  ctx.drawImage(src, 0, 0);

  if (mode === 'tear') runTear(pc, src);
  else runBurn(pc, src);
}

/* ─── TEAR ─── */
function runTear(pc, src) {
  const msgs = ['grip tight...','pulling apart...','ripping!','shredding...','tearing!'];
  $('status-text').textContent = msgs[Math.floor(Math.random()*msgs.length)];

  const pw = src.width, ph = src.height;

  // Shake animation on main canvas
  let shakes = 0;
  const maxShakes = 8;
  const shakeInterval = setInterval(() => {
    const dx = (Math.random()-0.5)*10;
    const dy = (Math.random()-0.5)*4;
    pc.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    shakes++;
    if (shakes >= maxShakes) {
      clearInterval(shakeInterval);
      pc.style.transform = 'translate(-50%,-50%)';
      doTear(pc, src, pw, ph);
    }
  }, 40);
}

function doTear(pc, src, pw, ph) {
  // Hide main page
  pc.style.display = 'none';

  const stage = $('stage');
  const debris = $('debris-layer');

  // Create left half canvas
  const lc = document.createElement('canvas');
  lc.width = pw / 2;
  lc.height = ph;
  const lctx = lc.getContext('2d');
  lctx.drawImage(src, 0, 0, pw/2, ph, 0, 0, pw/2, ph);

  // Jagged tear edge on left — white out the right edge roughly
  lctx.globalCompositeOperation = 'destination-out';
  const tearPath = buildJaggedPath(ph, pw/2, true);
  lctx.fillStyle = '#000';
  lctx.fill(tearPath);
  lctx.globalCompositeOperation = 'source-over';
  // Dark tear line
  lctx.strokeStyle = 'rgba(60,40,20,0.5)';
  lctx.lineWidth = 1.5;
  lctx.stroke(buildJaggedLine(ph));

  // Create right half canvas
  const rc = document.createElement('canvas');
  rc.width = pw / 2;
  rc.height = ph;
  const rctx = rc.getContext('2d');
  rctx.drawImage(src, pw/2, 0, pw/2, ph, 0, 0, pw/2, ph);

  // Jagged edge on right
  rctx.globalCompositeOperation = 'destination-out';
  const tearPathR = buildJaggedPath(ph, 0, false);
  rctx.fillStyle = '#000';
  rctx.fill(tearPathR);
  rctx.globalCompositeOperation = 'source-over';
  rctx.strokeStyle = 'rgba(60,40,20,0.5)';
  rctx.lineWidth = 1.5;
  rctx.stroke(buildJaggedLine(ph));

  // Position canvases
  const stageRect = $('stage').getBoundingClientRect();
  const cx = stageW / 2;
  const cy = stageH / 2;
  const pageTop = cy - ph/2;
  const pageLeft = cx - pw/2;

  lc.style.cssText = `position:absolute; left:${pageLeft}px; top:${pageTop}px; transition:transform 0.75s cubic-bezier(.4,0,1,1), opacity 0.75s; transform-origin:left center; will-change:transform;`;
  rc.style.cssText = `position:absolute; left:${pageLeft + pw/2}px; top:${pageTop}px; transition:transform 0.75s cubic-bezier(.4,0,1,1), opacity 0.75s; transform-origin:right center; will-change:transform;`;

  stage.appendChild(lc);
  stage.appendChild(rc);

  // Paper confetti
  for (let i = 0; i < 18; i++) spawnPaperBit(debris, cx, cy, pw, ph);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    lc.style.transform = `translateX(-${pw*0.7}px) rotate(-20deg)`;
    lc.style.opacity = '0';
    rc.style.transform = `translateX(${pw*0.7}px) rotate(20deg)`;
    rc.style.opacity = '0';
  }));

  setTimeout(() => {
    lc.remove();
    rc.remove();
    pc.style.display = 'block';
    const delay = 300 + Math.random()*200;
    setTimeout(nextPage, delay);
  }, 900);
}

function buildJaggedPath(h, startX, isLeft) {
  const path = new Path2D();
  const segments = 18;
  const segH = h / segments;
  const jag = 12;

  if (isLeft) {
    path.moveTo(startX, 0);
    for (let i = 0; i <= segments; i++) {
      const y = i * segH;
      const x = startX + (Math.random()-0.3)*jag;
      path.lineTo(x, y);
    }
    path.lineTo(startX + 40, h);
    path.lineTo(startX + 40, 0);
    path.closePath();
  } else {
    path.moveTo(0, 0);
    for (let i = 0; i <= segments; i++) {
      const y = i * segH;
      const x = (Math.random()-0.7)*jag;
      path.lineTo(x, y);
    }
    path.lineTo(-40, h);
    path.lineTo(-40, 0);
    path.closePath();
  }
  return path;
}

function buildJaggedLine(h) {
  const path = new Path2D();
  const segments = 18;
  const segH = h / segments;
  path.moveTo(0, 0);
  for (let i = 1; i <= segments; i++) {
    const y = i * segH;
    const x = (Math.random()-0.5)*8;
    path.lineTo(x, y);
  }
  return path;
}

function spawnPaperBit(layer, cx, cy, pw, ph) {
  const el = document.createElement('canvas');
  const size = Math.random()*20+8;
  el.width = size; el.height = size*0.6;
  const ctx = el.getContext('2d');
  ctx.fillStyle = `hsl(40,${20+Math.random()*20}%,${88+Math.random()*8}%)`;
  ctx.beginPath();
  ctx.moveTo(Math.random()*size, 0);
  ctx.lineTo(size, Math.random()*el.height);
  ctx.lineTo(size - Math.random()*size*0.3, el.height);
  ctx.lineTo(Math.random()*size*0.3, el.height - Math.random()*el.height*0.3);
  ctx.closePath();
  ctx.fill();

  const sx = cx + (Math.random()-0.5)*pw*0.4;
  const sy = cy + (Math.random()-0.5)*ph*0.4;
  const tx = (Math.random()-0.5)*300;
  const ty = Math.random()*200+30;
  const rot = (Math.random()-0.5)*720;
  const dur = (Math.random()*0.5+0.5).toFixed(2);
  const delay = (Math.random()*0.15).toFixed(2);

  el.style.cssText = `position:absolute; left:${sx}px; top:${sy}px; --tx:${tx}px; --ty:${ty}px; --rot:${rot}deg; animation:pieceFloat ${dur}s ease-out ${delay}s forwards; opacity:0.9;`;
  layer.appendChild(el);
  setTimeout(() => el.remove(), (parseFloat(dur)+parseFloat(delay)+0.2)*1000);
}

/* ─── BURN ─── */
function runBurn(pc, src) {
  const msgs = ['igniting...','flames spreading...','consumed by fire...','reducing to ash...'];
  $('status-text').textContent = msgs[Math.floor(Math.random()*msgs.length)];

  const stage = $('stage');
  const debris = $('debris-layer');
  const pw = src.width, ph = src.height;

  // Work on a burn canvas overlaying the original
  const bc = document.createElement('canvas');
  bc.width = pw; bc.height = ph;
  bc.style.cssText = `position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:${pw}px; height:${ph}px; z-index:10;`;
  stage.appendChild(bc);
  const bctx = bc.getContext('2d');

  // Get pixel data from the source page
  const offscreen = document.createElement('canvas');
  offscreen.width = pw; offscreen.height = ph;
  const octx = offscreen.getContext('2d');
  octx.drawImage(src, 0, 0);
  const srcData = octx.getImageData(0, 0, pw, ph);

  // Hide original
  pc.style.display = 'none';

  // Burn origin — bottom center with slight random offset
  const originX = pw * (0.35 + Math.random()*0.3);
  const originY = ph;
  const maxDist = Math.sqrt(Math.max(originX, pw-originX)**2 + ph**2) + 60;

  let startTime = null;
  const duration = 1600;

  function frame(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(1, elapsed / duration);

    const burnFront = progress * (maxDist + 60);
    const imageData = bctx.createImageData(pw, ph);
    const dst = imageData.data;
    const src2 = srcData.data;

    for (let y = 0; y < ph; y++) {
      for (let x = 0; x < pw; x++) {
        const idx = (y * pw + x) * 4;
        const dist = Math.sqrt((x - originX)**2 + (y - originY)**2);
        const d = burnFront - dist;

        if (d > 30) {
          // Fully burned: charred black/dark brown
          const noise = Math.random()*15;
          dst[idx]   = 10 + noise;
          dst[idx+1] = 7 + noise*0.5;
          dst[idx+2] = 5;
          dst[idx+3] = Math.max(0, 255 - (d-30)*5);
        } else if (d > 0) {
          // Burning front: orange/red glow blending
          const t = d / 30;
          const r = src2[idx], g = src2[idx+1], b = src2[idx+2];
          dst[idx]   = Math.min(255, r*t + 255*(1-t));
          dst[idx+1] = Math.min(255, g*t + 40*(1-t));
          dst[idx+2] = Math.min(255, b*t*0.2);
          dst[idx+3] = 255;
        } else {
          // Untouched
          dst[idx]   = src2[idx];
          dst[idx+1] = src2[idx+1];
          dst[idx+2] = src2[idx+2];
          dst[idx+3] = src2[idx+3];
        }
      }
    }
    bctx.putImageData(imageData, 0, 0);

    // Draw fire glow line on top
    if (progress < 0.95) {
      const gradient = bctx.createRadialGradient(originX, originY - burnFront, 0, originX, originY - burnFront, 18);
      gradient.addColorStop(0, 'rgba(255,200,60,0.7)');
      gradient.addColorStop(0.4, 'rgba(255,80,0,0.5)');
      gradient.addColorStop(1, 'rgba(255,40,0,0)');

      // Draw fire glow along the burn edge
      for (let fx = 0; fx < pw; fx += 4) {
        const fy2 = originY - (burnFront - Math.sqrt(Math.max(0,(burnFront**2 - (fx-originX)**2))));
        // approximate burn edge y at this x
        const edgeDist = burnFront;
        const dy = originY - Math.sqrt(Math.max(0, edgeDist**2 - (fx-originX)**2));
        const alpha = Math.random()*0.6+0.3;
        bctx.fillStyle = `rgba(255,${80+Math.random()*120},0,${alpha})`;
        bctx.fillRect(fx, Math.max(0, dy-2), 3, 6);
      }
    }

    // Particles
    const stageEl = $('stage');
    const pw2 = pw, cx = stageEl.offsetWidth/2, cy2 = stageEl.offsetHeight/2;
    const pageLeft = cx - pw/2;
    const pageTop = cy2 - ph/2;

    if (Math.random() < 0.8) spawnEmber(debris, pageLeft, pageTop, pw, ph, progress);
    if (Math.random() < 0.45) spawnSmoke(debris, pageLeft, pageTop, pw, ph, progress);
    if (progress > 0.3 && Math.random() < 0.35) spawnAsh(debris, pageLeft, pageTop, pw, ph, progress);

    if (elapsed < duration + 200) {
      requestAnimationFrame(frame);
    } else {
      bc.remove();
      pc.style.display = 'block';
      const delay = 300 + Math.random()*200;
      setTimeout(nextPage, delay);
    }
  }

  requestAnimationFrame(frame);
}

function spawnEmber(layer, pageLeft, pageTop, pw, ph, progress) {
  const el = document.createElement('div');
  el.className = 'ember';
  const sx = pageLeft + Math.random()*pw;
  const sy = pageTop + ph*(0.6 + (1-progress)*0.3);
  const ex = (Math.random()-0.5)*140;
  const ey = -(Math.random()*100+40);
  const dur = (Math.random()*0.5+0.35).toFixed(2);
  const size = Math.random()*4+2;
  const hue = 15 + Math.random()*30;
  el.style.cssText = `left:${sx}px; top:${sy}px; width:${size}px; height:${size}px; background:hsl(${hue},100%,60%); box-shadow:0 0 4px hsl(${hue},100%,50%); --ex:${ex}px; --ey:${ey}px; animation:emberFloat ${dur}s ease-out forwards;`;
  layer.appendChild(el);
  setTimeout(() => el.remove(), parseFloat(dur)*1000+100);
}

function spawnSmoke(layer, pageLeft, pageTop, pw, ph, progress) {
  const el = document.createElement('div');
  el.className = 'smoke';
  const sx = pageLeft + pw*0.2 + Math.random()*pw*0.6;
  const sy = pageTop + ph*(0.5 + (1-progress)*0.4);
  const size = Math.random()*35+15;
  const dur = (Math.random()*0.8+0.7).toFixed(2);
  el.style.cssText = `left:${sx}px; top:${sy}px; width:${size}px; height:${size}px; background:rgba(70,60,50,0.35); filter:blur(8px); --sx:${(Math.random()-0.5)*20}px; animation:smokeRise ${dur}s ease-out forwards;`;
  layer.appendChild(el);
  setTimeout(() => el.remove(), parseFloat(dur)*1000+100);
}

function spawnAsh(layer, pageLeft, pageTop, pw, ph, progress) {
  const el = document.createElement('div');
  el.className = 'ash';
  const sx = pageLeft + Math.random()*pw;
  const sy = pageTop + ph*0.3 + Math.random()*ph*0.3;
  const w = Math.random()*10+3;
  const h2 = Math.random()*4+2;
  const ey = Math.random()*180+80;
  const rot = (Math.random()-0.5)*200;
  const dur = (Math.random()*0.9+0.7).toFixed(2);
  el.style.cssText = `left:${sx}px; top:${sy}px; width:${w}px; height:${h2}px; --ey:${ey}px; --rot:${rot}deg; animation:ashFall ${dur}s ease-in ${(Math.random()*0.3).toFixed(2)}s forwards;`;
  layer.appendChild(el);
  setTimeout(() => el.remove(), parseFloat(dur)*1000+500);
}

function finishDestruction() {
  animRunning = false;
  $('progress-fill').style.width = '100%';
  $('page-counter').textContent = `ALL ${totalPages} PAGES DESTROYED`;
  $('page-canvas').style.display = 'none';
  $('debris-layer').innerHTML = '';

  const m = mode === 'tear'
    ? ['obliterated.','nothing remains.','thoroughly shredded.','gone forever.']
    : ['reduced to ash.','nothing but smoke.','incinerated.','dust.'];
  $('status-text').textContent = m[Math.floor(Math.random()*m.length)];

  setTimeout(() => { $('restart-btn').style.display = 'block'; }, 600);
}
</script>
</body>
</html>
